---
# ------------------------------------------------------------------------------
# release => gitlab:release [[
# ------------------------------------------------------------------------------
.gitlab:release:
  extends: .core:defaults
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    GIT_STRATEGY: none
  script:
    - /bin/true

  release:
    name: "$CI_COMMIT_TAG"
    description: "$CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    ref: "$CI_COMMIT_SHA"
    assets:
      links:
        - name: 'Pipeline URL'
          url: "$CI_PIPELINE_URL"
          link_type: 'other'
        #- name: 'Download'
        #  url: "https://asustor.cappysan.dev/downloads/${CI_PROJECT_NAME}/cappysan-${CI_PROJECT_NAME}_${CI_COMMIT_TAG}_any.apk"
        #  link_type: 'package'
        #- name: 'Signature'
        #  url: "https://asustor.cappysan.dev/downloads/${CI_PROJECT_NAME}/cappysan-${CI_PROJECT_NAME}_${CI_COMMIT_TAG}_any.apk.sig"
        #  link_type: 'other'
  rules:
    - !reference [".core:rules:not_if", is_not_protected]
    - !reference [".core:rules:if", is_tag]
    - when: never
# ]]

